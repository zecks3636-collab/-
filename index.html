<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3사 통합 월간 일정 대시보드</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/variable/pretendardvariable.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <meta name="description" content="Group, NBT, BIO 통합 월간 경영 일정 대시보드">
</head>
<body>
    <!-- Premium Decorative Orbs -->
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar glass-panel">
            <div class="logo-area">
                <h1>Schedule<br><span>Insight</span></h1>
            </div>
            
            <div class="filters">
                <h3>회사별 일정 보기</h3>
                <button class="filter-btn active" data-company="all">
                    <span class="dot all-dot"></span> 전체 보기
                </button>
                <button class="filter-btn" data-company="Group">
                    <span class="dot group-dot"></span> 그룹 (Group)
                </button>
                <button class="filter-btn" data-company="NBT">
                    <span class="dot nbt-dot"></span> 엔비티 (NBT)
                </button>
                <button class="filter-btn" data-company="BIO">
                    <span class="dot bio-dot"></span> 바이오 (BIO)
                </button>
            </div>

            <div class="upload-zone" id="uploadZone">
                <p>PDF 또는 엑셀 드래그 드롭<br/><span>일정 자동 업데이트</span></p>
                <input type="file" id="fileInput" accept=".pdf,.xls,.xlsx" style="display:none">
            </div>

            <div class="upcoming-events">
                <h3>주요 하이라이트 일정</h3>
                <ul id="upcomingList">
                    <!-- Events will be populated here -->
                </ul>
            </div>
        </aside>

        <!-- Main Content (Calendar) -->
        <main class="main-content">
            <header class="top-header">
                <div class="month-selector" style="display:flex; align-items:center; gap:15px;">
                    <button class="nav-btn" id="prevMonth" style="background:transparent;border:none;font-size:24px;cursor:pointer;color:#777;">&lt;</button>
                    <div>
                        <h2 id="monthTitle">2026. 04</h2>
                        <span class="subtitle">통합 경영 캘린더</span>
                    </div>
                    <button class="nav-btn" id="nextMonth" style="background:transparent;border:none;font-size:24px;cursor:pointer;color:#777;">&gt;</button>
                </div>
                <div class="search-bar glass-panel">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="searchInput" placeholder="키워드 혹은 회사명 검색...">
                </div>
            </header>

            <div class="calendar-wrapper glass-panel">
                <div class="calendar-header">
                    <div class="sun">SUN</div><div>MON</div><div>TUE</div><div>WED</div><div>THU</div><div>FRI</div><div class="sat">SAT</div>
                </div>
                <div class="calendar-grid" id="calendarGrid">
                    <!-- Days will be generated by JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- Event Detail Modal -->
    <div class="modal-overlay" id="eventModal">
        <div class="modal-content glass-panel">
            <button class="close-btn" id="closeModal">&times;</button>
            <div class="modal-header">
                <span id="modalCompany" class="company-badge">Group</span>
                <h3 id="modalTitle">일정 상세</h3>
            </div>
            <div class="modal-body">
                <p><strong>일정:</strong> <span id="modalDate"></span></p>
                <p><strong>비고:</strong> 정기 일정</p>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
