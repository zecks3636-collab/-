version: 1.0
runtime: python311
build:
  commands:
    build:
      - python3 -m pip install --upgrade pip
      - python3 -m pip install --target /app/packages -r requirements.txt
run:
  command: "python3 -m uvicorn server:app --host 0.0.0.0 --port 8080"
  network:
    port: 8080
  env:
    - name: DB_SECRET_ARN
      value: "arn:aws:secretsmanager:ap-northeast-1:559784498787:secret:app_bti_schedule_prd-lJAp1t"
    - name: DB_NAME
      value: "postgres"
    - name: PYTHONPATH
      value: "/app/packages"
